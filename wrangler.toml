name = "ioark-cloudflare"
main = "_worker.js"
workers_dev = true
compatibility_date = "2025-09-01"

# If you deploy locally with `wrangler deploy` (rather than a Git-connected
# Cloudflare Workers Build), uncomment and set your account id:
# account_id = "<your-cloudflare-account-id>"

# Static asset binding for the Vite SPA.
# `binding = "ASSETS"` exposes env.ASSETS.fetch() inside _worker.js.
# Wrangler 3.78+ honours this block; older versions ignore it silently, which
# leaves env.ASSETS undefined at runtime (see the guard in _worker.js).
[assets]
directory = "./dist"
binding = "ASSETS"

[build]
command = "npm run build"

# Worker variables (override in the dashboard: Workers -> Settings -> Variables).
[vars]
# Backend the Worker reverse-proxies /api, /authorize, /oauth, /scim,
# /.well-known and /healthz to.
BACKEND_ORIGIN = "https://apis.ioark.online"
# Domain the SPA (and tenant subdomains) are served under. The Worker derives
# X-Tenant from the visited host: acme.ioark.online -> "acme"; the bare domain,
# www, or a *.workers.dev URL -> the control plane ("system"). Adjust to match
# the custom domain you attach to this Worker.
TENANT_BASE_DOMAIN = "ioark.online"
