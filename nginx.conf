# Single-origin edge (merged from the former proxy service):
# serves the SPA and reverse-proxies API/OIDC/SCIM to the backend.
server {
    listen 3007;
    server_name _;

    # Security headers (defense in depth; the app also sets its own).
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'" always;

    client_max_body_size 2m;

    # Backend: API, OIDC, SCIM (forwards Host so tenant subdomains resolve)
    location ~ ^/(api|authorize|oauth|scim|\.well-known|healthz) {
        proxy_pass http://backend:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA with client-side routing fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
